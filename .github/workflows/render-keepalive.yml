name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: curl --fail --silent --show-error --retry 2 --retry-all-errors --retry-delay 10 --max-time 70 https://careattend-api.onrender.com/health
