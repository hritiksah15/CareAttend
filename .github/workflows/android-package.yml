name: Android App Package

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: Backend API base URL baked into the app
        required: true
        default: https://careattend-api.onrender.com
  push:
    branches: [master]
    paths:
      - care_attend_app/**
      - .github/workflows/android-package.yml

permissions:
  contents: read

defaults:
  run:
    working-directory: care_attend_app

jobs:
  android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Configure Android release signing
        if: env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != ''
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=app/upload-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE=${{ github.event.inputs.api_base || 'https://careattend-api.onrender.com' }}

      - name: Build release app bundle
        run: flutter build appbundle --release --dart-define=API_BASE=${{ github.event.inputs.api_base || 'https://careattend-api.onrender.com' }}

      - name: Upload Android package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: careattend-android-package
          path: |
            care_attend_app/build/app/outputs/flutter-apk/app-release.apk
            care_attend_app/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
