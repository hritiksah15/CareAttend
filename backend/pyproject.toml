[project]
name = "careattend-backend"
version = "0.1.0"
description = "CareAttend — NHS predictive risk assessment for missed appointments (DNA)."
readme = "../README.md"
requires-python = ">=3.12"
authors = [{ name = "Hritik Kumar Sah" }]
license = { text = "MIT" }

# Runtime dependencies are pinned in requirements.txt (kept as the single source
# of truth for reproducible model unpickling under CI/Docker).

[tool.ruff]
target-version = "py312"
line-length = 120
# Alembic migrations are autogenerated — don't lint them.
extend-exclude = ["migrations"]

[tool.ruff.lint]
# Pyflakes (F) catches real bugs (undefined names, unused imports);
# a curated pycodestyle subset (E/W) catches syntax-level issues.
# Bugbear (B) flags likely-wrong patterns.
select = ["E", "F", "W", "B"]
ignore = [
    "E501",  # line length handled by line-length, don't hard-fail
    "E741",  # ambiguous variable names (l, I) — present in ML code
    "B008",  # function calls in argument defaults (common in Flask)
]

[tool.ruff.lint.per-file-ignores]
# Tests set sys.path before importing app (E402) and re-use fixtures (F811);
# unused-import/var noise in tests is not worth failing CI over.
"tests/*" = ["F401", "F811", "B011", "E402", "F841"]

[tool.pytest.ini_options]
# conftest.py forces a throwaway SQLite DB before app import (never touches PostgreSQL).
addopts = "-q"
testpaths = ["tests"]
