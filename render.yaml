services:
  - type: web
    name: careattend-api
    runtime: python
    rootDir: .
    region: frankfurt
    plan: free
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd backend && gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 wsgi:app
    initialDeployHook: cd backend && flask --app app create-admin
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FLASK_DEBUG
        value: "0"
      - key: RESET_DEV_CODE
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: careattend-db
          property: connectionString
      # Firebase Hosting origins for the Flutter web app.
      - key: CORS_ORIGINS
        value: "https://careattend-64793.web.app,https://careattend-64793.firebaseapp.com"
      - key: CAREATTEND_ADMIN_USER
        sync: false
      - key: CAREATTEND_ADMIN_EMAIL
        sync: false
      - key: CAREATTEND_ADMIN_PASSWORD
        sync: false

databases:
  - name: careattend-db
    region: frankfurt
    plan: free
    databaseName: careattend
    user: careattend
