<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Care Attend — NHS predictive DNA (did-not-attend) risk assessment with explainable AI and fairness monitoring.">
  <meta name="theme-color" content="#003087">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Care Attend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Care Attend — NHS Risk Assessment</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Branded boot splash — shown while main.dart.js compiles/loads so the
       user never sees a blank white screen. Removed on Flutter's first frame. */
    #ca-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, #003087 0%, #002060 100%);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: opacity .4s ease; opacity: 1;
    }
    #ca-splash.ca-hide { opacity: 0; pointer-events: none; }
    #ca-splash .ca-mark {
      width: 64px; height: 64px; border-radius: 18px;
      background: rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    #ca-splash .ca-mark svg { width: 34px; height: 34px; }
    #ca-splash h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: .3px; }
    #ca-splash p { font-size: 13px; opacity: .8; margin: 6px 0 26px; }
    #ca-splash .ca-spin {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.25); border-top-color: #41B6E6;
      animation: ca-rot .8s linear infinite;
    }
    #ca-splash.ca-error .ca-spin { display: none; }
    #ca-splash.ca-error p {
      max-width: 360px; line-height: 1.5; opacity: .92; text-align: center;
    }
    @keyframes ca-rot { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { #ca-splash .ca-spin { animation: none; } }
  </style>
</head>
<body>
  <div id="ca-splash" role="status" aria-label="Loading Care Attend">
    <div class="ca-mark">
      <svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
        <path d="M12 21s-7.5-4.6-7.5-10A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 7.5 4c0 5.4-7.5 10-7.5 10z"/>
      </svg>
    </div>
    <h1>Care Attend</h1>
    <p>NHS Predictive Risk Assessment</p>
    <div class="ca-spin"></div>
  </div>

  <script>
    // Remove the splash once Flutter has painted its first frame. If the
    // generated boot files are missing, keep a useful error instead of fading
    // to a blank white page.
    (function () {
      var flutterPainted = false;

      function hide() {
        flutterPainted = true;
        var s = document.getElementById('ca-splash');
        if (!s) return;
        s.classList.add('ca-hide');
        setTimeout(function () { if (s) s.remove(); }, 450);
      }

      function fail(message) {
        if (flutterPainted) return;
        var s = document.getElementById('ca-splash');
        if (!s) return;
        s.classList.add('ca-error');
        var text = s.querySelector('p');
        if (text) text.textContent = message;
      }

      window.careAttendBootFailed = fail;
      window.addEventListener('flutter-first-frame', hide);

      // Fallback: observe DOM for Flutter's view host in case the event is missed.
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) { hide(); obs.disconnect(); }
      });
      obs.observe(document.body, { childList: true, subtree: true });

      setTimeout(function () {
        fail('Care Attend is still loading. If this stays on screen, rebuild the Flutter app and open it from a local server, not by double-clicking index.html.');
      }, 12000);
    })();
  </script>
  <script
    src="flutter_bootstrap.js"
    async
    onerror="window.careAttendBootFailed && window.careAttendBootFailed('Flutter boot files are missing. Run the Flutter app from VS Code or serve the generated build/web folder after rebuilding.');"
  ></script>
</body>
</html>
