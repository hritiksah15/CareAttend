name: care_attend_app
description: Care Attend - NHS Predictive Risk Assessment Mobile Application
publish_to: 'none'
version: 1.2.1+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.2.0
  http: ^1.2.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  google_fonts: ^6.1.0
  image_picker: ^1.1.2
  image: ^4.2.0
  file_picker: ^8.1.2
  pdf: ^3.11.1
  printing: ^5.13.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  fonts:
    # Bundled so Urdu/Arabic glyphs render offline without CanvasKit having to
    # fetch a Noto fallback ("Could not find a set of Noto fonts..."). Variable
    # font covers the weight range used by the type scale.
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic.ttf
